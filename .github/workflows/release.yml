name: Create release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  id-token: write
  contents: write

jobs:
  create-release:
    if: github.actor_id != 278903378
    runs-on: ubuntu-latest
    steps:
      - name: Install zip
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Generate GitHub App token
        id: app_token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Get latest code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ steps.app_token.outputs.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.1.42"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Bump package version
        run: bun run .github/actions/bump-package-version.js
        env:
          TG_RELEASE_VERSION: ${{ github.ref_name }}

      - name: Push version bump change
        uses: EndBug/add-and-commit@v9
        with:
          add: package.json
          push: true
          default_author: github_actions
          message: "chore: bump version to ${{ github.ref_name }}"
          pull: "--rebase --autostash"

      - name: Build
        run: bun run build
        env:
          TG_RELEASE_VERSION: ${{ github.ref_name }}

      - name: Bundle files
        run: |
          mkdir -p ./temp/ox_core/common
          cp ./{LICENSE,README.md,fxmanifest.lua} ./temp/ox_core
          cp -r ./{lib,locales,sql,dist} ./temp/ox_core
          cp -r ./common/data ./temp/ox_core/common/data
          cd ./temp && zip -r ../ox_core.zip ./ox_core

      - name: Publish package to npm registry
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          prerelease: false
          files: ox_core.zip

      - name: Update tag to latest
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ github.ref_name }}';
            await github.rest.git.updateRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'tags/latest',
              sha: context.sha,
              force: true
            });
